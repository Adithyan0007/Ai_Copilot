services:
  redis:
    image: redis:7-alpine
    container_name: ai_copilot_redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: ai_copilot_backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  frontend:
    build:
      context: ./ai_copilot_frontend
    container_name: ai_copilot_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  worker:
    build: .
    container_name: ai_copilot_worker
    command: node src/worker/document.worker.js
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
      - backend
